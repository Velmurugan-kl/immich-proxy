# =============================================================================
# Immich + HEIC Proxy  —  docker-compose.yml  (Portainer edition)
# =============================================================================
#
# SETUP IN PORTAINER:
#   1. Stacks → Add stack → Repository (point to your GitHub repo)
#   2. Add the following environment variables in Portainer's
#      "Environment variables" section:
#
#       UPLOAD_LOCATION       /mnt/d/HomeLab/immich/photos
#       DB_DATA_LOCATION      /mnt/d/HomeLab/immich/postgres
#       DB_PASSWORD           your_strong_password
#       DB_USERNAME           immich
#       DB_DATABASE_NAME      immich
#       IMMICH_VERSION        release
#
#   3. Deploy the stack.
#   4. Point your Immich app / browser to http://<host>:2283 (the proxy).
#
# PORTS:
#   2283  →  proxy (clients connect here)
#   2284  →  immich-server direct (debug only)
#   2285  →  proxy admin API (/admin/health, /admin/reload)
# =============================================================================

name: immich

services:
  # ---------------------------------------------------------------------------
  # HEIC Proxy
  # ---------------------------------------------------------------------------
  immich-heic-proxy:
    image: ghcr.io/velmurugan-kl/immich-proxy:latest
    container_name: immich_heic_proxy
    ports:
      - "2283:2283"
      - "2285:2285"
    volumes:
      # Named volumes — Portainer manages these, no host path needed
      - proxy-config:/app/config
      - proxy-tmp:/tmp/proxy
    environment:
      # --- Upstream ---
      IMMICH_UPSTREAM: "http://immich-server:2283"

      # --- Output format: jpeg | png | webp | tiff | original ---
      IMMICH_FORMAT: "png"

      # --- Quality (only active format matters) ---
      IMMICH_JPEG_QUALITY: "95"
      IMMICH_PNG_COMPRESSION: "1"
      IMMICH_WEBP_QUALITY: "90"
      IMMICH_WEBP_LOSSLESS: "false"

      # --- Filename template ---
      IMMICH_TEMPLATE: "{year}-{month}-{day}_{make}_{model}_{filename}"
      IMMICH_FALLBACK: "unknown"

      # --- Workers (0 = auto) ---
      IMMICH_WORKERS: "0"

      # --- Ports ---
      PROXY_PORT: "2283"
      ADMIN_PORT: "2285"

      # --- Tmp dir ---
      IMMICH_TMP_DIR: "/tmp/proxy"

    depends_on:
      immich-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:2283/admin/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - immich-net

  # ---------------------------------------------------------------------------
  # Immich server
  # ---------------------------------------------------------------------------
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      # Inlined here instead of env_file so Portainer can resolve the variables
      DB_HOSTNAME: database
      DB_PORT: "5432"
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USERNAME: ${DB_USERNAME}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
      REDIS_HOSTNAME: redis
    ports:
      - "2284:2283" # direct access (debug only — do not use for clients)
    expose:
      - "2283" # internal Docker network only
    depends_on:
      - redis
      - database
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:2283/api/server/ping",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - immich-net

  # ---------------------------------------------------------------------------
  # Machine learning
  # ---------------------------------------------------------------------------
  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    restart: unless-stopped
    healthcheck:
      disable: false
    networks:
      - immich-net

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped
    networks:
      - immich-net

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immich-net

volumes:
  model-cache:
  proxy-config:
  proxy-tmp:

networks:
  immich-net:
    driver: bridge
